<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini POS - Final Perfect Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --danger: #f43f5e;
            --success: #10b981; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; color: var(--text); height: 100vh; overflow: hidden; }

        .navbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 30px; height: 70px; display: flex; justify-content: space-between; align-items: center; }
        .login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-card { background: var(--card); padding: 50px; border-radius: 32px; width: 400px; text-align: center; }
        
        #main-app { display: none; height: calc(100vh - 70px); padding: 20px; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 350px; gap: 20px; height: 100%; }
        .staff-mode { grid-template-columns: 1fr 400px !important; }

        .panel { background: var(--card); border-radius: 28px; padding: 22px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .section-header { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.05em; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: white; border: 1px solid var(--border); padding: 15px; border-radius: 20px; text-align: center; position: relative; transition: 0.2s; cursor: pointer; }
        .card.out-of-stock { opacity: 0.6; background: #fffcfc; cursor: not-allowed; }
        
        .admin-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; opacity: 0; transition: 0.2s; }
        .card:hover .admin-actions { opacity: 1; }
        .action-btn { width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .btn-edit { background: #f0f9ff; color: var(--accent); }
        .btn-del { background: #fff1f2; color: var(--danger); }

        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 0.85rem; margin-bottom: 8px; outline: none; }
        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.85rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; width: 100%; }
        .btn-danger { background: #fff1f2; color: var(--danger); }
        .btn-outline { background: white; color: var(--text); border: 1px solid var(--border); }
        
        /* Animasi Putar Tombol Refresh */
        .rotating { animation: spin 0.5s pre-infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 4000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-card { background: white; width: 500px; border-radius: 28px; padding: 25px; }
        
        .tab-nav { display: flex; gap: 15px; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .tab-link { padding: 10px 5px; cursor: pointer; font-weight: 700; color: #94a3b8; border-bottom: 3px solid transparent; }
        .tab-link.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        .manage-item { background: #f8fafc; padding: 12px; border-radius: 18px; margin-bottom: 8px; border: 1px solid var(--border); }
        .admin-only { display: none; }
        .data-box { background: #f1f5f9; padding: 15px; border-radius: 22px; border: 1px dashed #cbd5e1; margin-top: 15px; }
        .omset-card { background: #ffffff; padding: 10px 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 8px; }
    </style>
</head>
<body>

<div id="settings-modal" class="modal">
    <div class="modal-card">
        <div class="tab-nav">
            <div class="tab-link active" onclick="switchTab(event, 'tab-u')">👥 Akun Kasir</div>
            <div class="tab-link" onclick="switchTab(event, 'tab-c')">🏷️ Kategori</div>
            <div class="tab-link" onclick="switchTab(event, 'tab-s')">🔐 Keamanan</div>
        </div>
        <div id="tab-u" class="tab-content">
            <div id="u-list" style="max-height: 30vh; overflow-y:auto;"></div>
            <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="addKasir()">+ Tambah Kasir</button>
        </div>
        <div id="tab-c" class="tab-content" style="display:none;">
            <div id="c-list" style="max-height: 30vh; overflow-y:auto;"></div>
            <div style="display:flex; gap:8px; margin-top:10px;"><input type="text" id="nc-inp" style="margin:0;"><button class="btn btn-primary" onclick="addCat()">Tambah</button></div>
        </div>
        <div id="tab-s" class="tab-content" style="display:none;">
            <label><small>Password Baru Admin:</small></label>
            <input type="password" id="adm-p-new" placeholder="Masukkan password baru">
            <button class="btn btn-primary" onclick="updateAdminPass()">Simpan Password</button>
        </div>
        <button class="btn btn-outline" style="margin-top:20px; width:100%;" onclick="closeModal('settings-modal')">Tutup</button>
    </div>
</div>

<div id="edit-prod-modal" class="modal">
    <div class="modal-card" style="width: 400px;">
        <h3>Update Data Produk</h3>
        <input type="hidden" id="ep-idx">
        <input type="text" id="ep-n" placeholder="Nama Barang">
        <select id="edit-p-cat"></select>
        <div style="display:flex; gap:10px;"><input type="number" id="ep-p" placeholder="Harga"><input type="number" id="ep-s" placeholder="Stok"></div>
        <button class="btn btn-primary" onclick="execUpdate()">Simpan Perubahan</button>
        <button class="btn btn-outline" onclick="closeModal('edit-prod-modal')" style="width:100%; margin-top:10px;">Batal</button>
    </div>
</div>

<div id="receipt-modal" class="modal">
    <div class="modal-card" style="text-align:center; width: 400px;">
        <div style="font-size: 3rem;">✅</div>
        <h3>Transaksi Berhasil</h3>
        <div id="res-box" style="background:#f8fafc; padding:20px; border-radius:20px; margin:15px 0; text-align:left; border:1px solid var(--border);">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">Total Belanja: <b id="res-total"></b></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">Tunai: <span id="res-cash"></span></div>
            <div style="display:flex; justify-content:space-between; padding-top:10px; border-top:1px dashed #ccc;">Kembali: <b id="res-change" style="color:var(--success); font-size:1.2rem;"></b></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn btn-primary" onclick="genPDF()">Cetak Struk</button>
            <button class="btn btn-outline" onclick="resetTx()">Selesai</button>
        </div>
    </div>
</div>

<div id="qty-modal" class="modal"><div class="modal-card" style="width:300px;"><h3>Jumlah</h3><p id="qty-title"></p><input type="number" id="qty-input" value="1" min="1"><button class="btn btn-primary" onclick="confirmAdd()">Masukan</button><button class="btn" style="width:100%; background:none;" onclick="closeModal('qty-modal')">Batal</button></div></div>

<nav class="navbar" id="navbar" style="display:none;">
    <div style="font-weight: 800; font-size: 1.2rem;">GEMINI<span style="color:var(--accent)">MART</span></div>
    <div id="u-disp" style="font-weight:700; color:#64748b;"></div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-outline" onclick="syncData(this)" title="Refresh Data">
            <span id="refresh-icon">🔄</span> Refresh
        </button>
        <button class="btn btn-outline admin-only" onclick="openSettings()">Setting ⚙️</button>
        <button class="btn btn-danger" onclick="location.reload()">Logout</button>
    </div>
</nav>

<div id="login-screen" class="login-overlay"><div class="login-card"><h2>POS LOGIN</h2><input type="text" id="u-in" placeholder="Username"><input type="password" id="p-in" placeholder="Password" onkeypress="if(event.key==='Enter')login()"><button class="btn btn-primary" onclick="login()">Masuk</button></div></div>

<div id="main-app">
    <div class="grid-layout" id="main-grid">
        <aside class="sidebar admin-only panel">
            <div class="section-header">📦 Input Produk Baru</div>
            <input type="text" id="pName" placeholder="Nama Barang"><select id="pCatInp"></select>
            <div style="display:flex; gap:10px;"><input type="number" id="pPrice" placeholder="Harga"><input type="number" id="pStock" placeholder="Stok"></div>
            <button onclick="saveNewP()" class="btn btn-primary" style="margin-bottom: 20px;">Simpan ke Katalog</button>
            
            <div class="section-header">💰 Laporan Omset</div>
            <div class="omset-card">
                <small style="color:#94a3b8; font-weight:700;">HARI INI</small>
                <div id="omset-day" style="font-weight:800; color:var(--accent);">Rp 0</div>
            </div>
            <div class="omset-card">
                <small style="color:#94a3b8; font-weight:700;">BULAN INI</small>
                <div id="omset-month" style="font-weight:800; color:var(--success);">Rp 0</div>
            </div>
            <div class="omset-card">
                <small style="color:#94a3b8; font-weight:700;">TAHUN INI</small>
                <div id="omset-year" style="font-weight:800; color:var(--primary);">Rp 0</div>
            </div>
        </aside>
        <main class="panel">
            <input type="text" id="search" placeholder="Cari barang..." onkeyup="render()">
            <div class="product-grid" id="menu" style="flex:1; overflow-y:auto; margin-top:15px;"></div>
        </main>
        <section id="side-right" class="panel"></section>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let users, prods, hist, cats;
    let cart = [], curU = null, selI = null, inv = null;

    // Load Data Awal
    function loadStorage() {
        users = JSON.parse(localStorage.getItem('f_users')) || [{u:"admin", p:"1234", r:"admin"}];
        prods = JSON.parse(localStorage.getItem('f_prod')) || [];
        hist = JSON.parse(localStorage.getItem('f_hist')) || [];
        cats = JSON.parse(localStorage.getItem('f_cats')) || ["Umum"];
    }
    loadStorage();

    // FUNGSI REFRESH DATA TANPA RELOAD HALAMAN
    function syncData(btn) {
        // Animasi icon putar
        const icon = btn.querySelector('#refresh-icon');
        icon.classList.add('rotating');
        
        // Ambil data terbaru dari storage
        loadStorage();
        
        // Render ulang elemen UI
        render();
        updateCatSels();
        if(curU && curU.r === 'admin') {
            calculateOmset();
            initChart();
        }
        
        // Hilangkan animasi setelah 500ms
        setTimeout(() => icon.classList.remove('rotating'), 500);
    }

    function login() {
        const u = document.getElementById('u-in').value, p = document.getElementById('p-in').value;
        const f = users.find(x => x.u === u && x.p === p);
        if(f) {
            curU = f; document.getElementById('login-screen').style.display='none';
            document.getElementById('navbar').style.display='flex';
            document.getElementById('main-app').style.display='block';
            document.getElementById('u-disp').innerText = u.toUpperCase();
            ui(); render(); updateCatSels();
            if(curU.r === 'admin') calculateOmset();
        } else alert("Username atau Password Salah!");
    }

    // LOGIKA OMSET, RENDER, DAN LAINNYA TETAP SAMA SEPERTI SEBELUMNYA
    function calculateOmset() {
        if(!curU || curU.r !== 'admin') return;
        const now = new Date();
        const dStr = now.toDateString();
        const mStr = now.getMonth() + "-" + now.getFullYear();
        const yStr = now.getFullYear().toString();
        let day = 0, month = 0, year = 0;
        hist.forEach(h => {
            const hDate = new Date(h.t);
            if(hDate.toDateString() === dStr) day += h.v;
            if((hDate.getMonth() + "-" + hDate.getFullYear()) === mStr) month += h.v;
            if(hDate.getFullYear().toString() === yStr) year += h.v;
        });
        document.getElementById('omset-day').innerText = "Rp " + day.toLocaleString();
        document.getElementById('omset-month').innerText = "Rp " + month.toLocaleString();
        document.getElementById('omset-year').innerText = "Rp " + year.toLocaleString();
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const isAdmin = curU ? curU.r === 'admin' : false;
        document.getElementById('menu').innerHTML = prods.filter(x => x.n.toLowerCase().includes(q) || x.cat.toLowerCase().includes(q)).map((x, i) => {
            const idx = prods.indexOf(x);
            const isHabis = x.s <= 0;
            return `<div class="card ${isHabis ? 'out-of-stock' : ''}" onclick="${isAdmin ? '' : (isHabis ? '' : `openQty(${idx})`)}">
                <span style="position:absolute; top:10px; left:10px; font-size:0.6rem; background:#eff6ff; color:var(--accent); padding:2px 8px; border-radius:20px; font-weight:700;">${x.cat}</span>
                ${isAdmin ? `<div class="admin-actions">
                    <button class="action-btn btn-edit" onclick="openEditProd(${idx})">✎</button>
                    <button class="action-btn btn-del" onclick="delProd(${idx})">✕</button>
                </div>` : ''}
                <b style="display:block; margin: 30px 0 5px;">${x.n}</b><b>Rp ${x.p.toLocaleString()}</b>
                <div style="font-size:0.75rem;" class="${isHabis ? 'stok-habis' : ''}">${isHabis ? 'STOK HABIS' : 'Stok: ' + x.s}</div>
            </div>`;
        }).join('');
    }

    function ui() {
        const r = document.getElementById('side-right');
        if(curU.r === 'admin') {
            document.querySelectorAll('.admin-only').forEach(e => e.style.display='flex');
            r.innerHTML = `<div class="section-header">📈 Tren Penjualan</div><canvas id="chart" style="max-height:160px;"></canvas>
            <div class="data-box">
                <div class="section-header">🛠️ Data Management</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px;">
                    <button class="btn btn-outline" onclick="exportJSON()" style="font-size:0.7rem;">Export</button>
                    <button class="btn btn-outline" onclick="document.getElementById('f-imp').click()" style="font-size:0.7rem;">Import</button>
                </div>
                <input type="file" id="f-imp" style="display:none" onchange="importJSON(event)">
                <button class="btn btn-danger" onclick="clearHistory()" style="width:100%; margin-top:10px; font-size:0.7rem;">Hapus Riwayat</button>
            </div>`;
            initChart();
        } else {
            document.getElementById('main-grid').classList.add('staff-mode');
            r.innerHTML = `<div class="section-header">🛒 Keranjang</div><div id="cart-list" style="flex:1; overflow-y:auto;"></div>
            <div style="padding-top:15px; border-top:2px solid #eee;">
                <div style="display:flex; justify-content:space-between;">Total<b id="g-total">Rp 0</b></div>
                <input type="number" id="cash-in" onkeyup="calc()" placeholder="Uang Tunai..." style="margin-top:10px; border:2px solid var(--accent); font-weight:800;">
                <div id="change-txt" style="font-size:0.8rem; color:var(--success); font-weight:700; margin-bottom:10px;">Kembali: Rp 0</div>
                <button id="p-btn" onclick="pay()" class="btn btn-primary" style="height:55px;" disabled>PROSES BAYAR</button>
            </div>`;
        }
    }

    function calc() {
        const gTot = document.getElementById('g-total');
        if(!gTot) return;
        const t = parseInt(gTot.innerText.replace(/\D/g,'')), c = parseInt(document.getElementById('cash-in').value||0);
        const ch = c - t;
        document.getElementById('change-txt').innerText = "Kembali: Rp " + (ch > 0 ? ch.toLocaleString() : "0");
        document.getElementById('p-btn').disabled = (c < t || t === 0);
    }

    function pay() {
        const t = parseInt(document.getElementById('g-total').innerText.replace(/\D/g,'')), c = parseInt(document.getElementById('cash-in').value);
        inv = { i: "TRX-"+Date.now().toString().slice(-5), d: new Date().toLocaleString(), items: [...cart], t, c, ch: (c-t) };
        cart.forEach(it => { const p = prods.find(x => x.n === it.n); if(p) p.s -= it.qty; });
        hist.push({ t: Date.now(), v: t, u: curU.u });
        saveP(); localStorage.setItem('f_hist', JSON.stringify(hist));
        document.getElementById('res-total').innerText = "Rp " + t.toLocaleString();
        document.getElementById('res-cash').innerText = "Rp " + c.toLocaleString();
        document.getElementById('res-change').innerText = "Rp " + (c-t).toLocaleString();
        document.getElementById('receipt-modal').style.display = 'flex';
    }

    function genPDF() {
        const doc = new jsPDF({unit:'mm', format:[80, 160]});
        doc.setFont("courier","bold"); doc.text("GEMINI MART", 40, 10, {align:"center"});
        doc.setFontSize(7); doc.setFont("courier","normal");
        doc.text(`${inv.d} | ID: ${inv.i}`, 5, 18);
        doc.text("------------------------------------------", 5, 22);
        let y = 26;
        inv.items.forEach(it => {
            doc.text(`${it.n}`, 5, y);
            doc.text(`${it.qty} x ${it.p.toLocaleString()}`, 5, y+3);
            doc.text((it.p * it.qty).toLocaleString(), 75, y+3, {align:"right"});
            y += 8;
        });
        doc.text("------------------------------------------", 5, y);
        doc.setFont("courier","bold");
        doc.text(`TOTAL      : Rp ${inv.t.toLocaleString()}`, 75, y+5, {align:"right"});
        doc.setFont("courier","normal");
        doc.text(`TUNAI      : Rp ${inv.c.toLocaleString()}`, 75, y+9, {align:"right"});
        doc.text(`KEMBALI    : Rp ${inv.ch.toLocaleString()}`, 75, y+13, {align:"right"});
        doc.setFontSize(8); doc.text("TERIMA KASIH", 40, y+22, {align:"center"});
        window.open(doc.output('bloburl'), '_blank');
    }

    // UTILITIES
    function saveP() { localStorage.setItem('f_prod', JSON.stringify(prods)); }
    function saveU() { localStorage.setItem('f_users', JSON.stringify(users)); }
    function saveC() { localStorage.setItem('f_cats', JSON.stringify(cats)); updateCatSels(); }
    function updateCatSels() { 
        const h = cats.map(c => `<option value="${c}">${c}</option>`).join(''); 
        const inp = document.getElementById('pCatInp');
        const edit = document.getElementById('edit-p-cat');
        if(inp) inp.innerHTML = h; 
        if(edit) edit.innerHTML = h; 
    }
    function openEditProd(i) { const p=prods[i]; document.getElementById('ep-idx').value=i; document.getElementById('ep-n').value=p.n; document.getElementById('ep-p').value=p.p; document.getElementById('ep-s').value=p.s; document.getElementById('edit-p-cat').value=p.cat; document.getElementById('edit-prod-modal').style.display='flex'; }
    function execUpdate() { const i=document.getElementById('ep-idx').value; prods[i]={n:document.getElementById('ep-n').value, p:parseInt(document.getElementById('ep-p').value), s:parseInt(document.getElementById('ep-s').value), cat:document.getElementById('edit-p-cat').value}; saveP(); render(); closeModal('edit-prod-modal'); }
    function delProd(i) { if(confirm("Hapus Produk ini?")){prods.splice(i,1); saveP(); render();}}
    function openQty(i) { selI=prods[i]; if(selI.s<=0) return; document.getElementById('qty-title').innerText=selI.n; document.getElementById('qty-modal').style.display='flex'; }
    function confirmAdd() { const q=parseInt(document.getElementById('qty-input').value); if(q>selI.s) return alert("Stok tidak cukup!"); const ex=cart.find(x=>x.n===selI.n); if(ex) ex.qty+=q; else cart.push({n:selI.n, p:selI.p, qty:q}); closeModal('qty-modal'); rCart(); }
    function rCart() { let t=0; document.getElementById('cart-list').innerHTML=cart.map((x,i)=>{t+=(x.p*x.qty); return `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${x.n} x${x.qty}</span><b>${(x.p*x.qty).toLocaleString()}</b></div>`}).join(''); document.getElementById('g-total').innerText=`Rp ${t.toLocaleString()}`; calc(); }
    function saveNewP() { const n=document.getElementById('pName').value, p=parseInt(document.getElementById('pPrice').value), s=parseInt(document.getElementById('pStock').value), cat=document.getElementById('pCatInp').value; if(n&&p){ prods.push({n,p,s,cat}); saveP(); render(); document.getElementById('pName').value=''; document.getElementById('pPrice').value=''; document.getElementById('pStock').value=''; }}
    function resetTx() { cart=[]; document.getElementById('receipt-modal').style.display='none'; ui(); render(); if(curU && curU.r === 'admin') calculateOmset(); }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    function switchTab(e, id) { document.querySelectorAll('.tab-content').forEach(x=>x.style.display='none'); document.querySelectorAll('.tab-link').forEach(x=>x.classList.remove('active')); document.getElementById(id).style.display='block'; e.target.classList.add('active'); }
    function initChart() { const ctx=document.getElementById('chart')?.getContext('2d'); if(!ctx) return; const d=[0,0,0,0,0,0,0]; hist.forEach(h=>{d[new Date(h.t).getDay()]+=h.v;}); new Chart(ctx, {type:'line', data:{labels:['M','S','S','R','K','J','S'], datasets:[{data:d,borderColor:'#3b82f6',fill:true,backgroundColor:'rgba(59, 130, 246, 0.1)',tension:0.4}]}, options:{plugins:{legend:{display:false}},scales:{y:{display:false},x:{grid:{display:false}}}}}); }
    function openSettings() { document.getElementById('settings-modal').style.display='flex'; renderU(); renderC(); }
    function renderU() { document.getElementById('u-list').innerHTML=users.filter(u=>u.r!=='admin').map((u,i)=>{const idx=users.indexOf(u); return `<div class="manage-item"><div style="display:flex; gap:5px;"><input type="text" value="${u.u}" onchange="users[${idx}].u=this.value; saveU();"> <input type="text" value="${u.p}" onchange="users[${idx}].p=this.value; saveU();"></div><button class="btn btn-danger" style="width:100%; padding:5px; margin-top:5px; font-size:0.7rem;" onclick="users.splice(${idx},1); saveU(); renderU();">Hapus</button></div>`}).join(''); }
    function addKasir() { const n=prompt("Nama Kasir:"); if(n){users.push({u:n,p:"1234",r:"staff"}); saveU(); renderU();}}
    function renderC() { document.getElementById('c-list').innerHTML=cats.map((c,i)=>`<div class="manage-item" style="display:flex; gap:5px; align-items:center;"><input type="text" value="${c}" onchange="syncCat(${i}, this.value)" style="margin:0; flex:1;"><button class="btn btn-danger" onclick="cats.splice(${i},1); saveC(); renderC();">×</button></div>`).join(''); }
    function addCat() { const v=document.getElementById('nc-inp').value; if(v){cats.push(v); saveC(); document.getElementById('nc-inp').value=''; renderC();}}
    function syncCat(i, val) { const old=cats[i]; cats[i]=val; prods.forEach(p=>{if(p.cat===old)p.cat=val}); saveC(); saveP(); render(); }
    function updateAdminPass() { const p=document.getElementById('adm-p-new').value; if(p){users.find(u=>u.r==='admin').p=p; saveU(); alert("Password Admin Diperbarui!");}}
</script>
</body>
</html>
